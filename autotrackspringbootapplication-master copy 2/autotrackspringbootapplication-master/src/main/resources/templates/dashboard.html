<!-- src/main/resources/templates/admin/dashboard.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Autotrack</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>

    <style>
        body {
            min-height: 100vh;
            background-color: #121212;
            color: #e0e0e0;
        }
        /* Sidebar */
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            background-color: #1f1f1f;
            padding-top: 60px;
        }
        .sidebar a {
            display: block;
            color: #e0e0e0;
            padding: 12px 20px;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #333;
            text-decoration: none;
        }
        /* Main Content */
        .main-content {
            margin-left: 220px;
            padding: 20px;
        }
        /* Navbar */
        .navbar {
            background-color: #1f1f1f !important;
        }
        .navbar .btn-light {
            background-color: #333;
            color: #e0e0e0;
        }
        /* Cards */
        .card {
            background-color: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<!-- Top Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <a class="navbar-brand ps-3" href="#">Autotrack Admin</a>
    <div class="ms-auto me-3">
        <a class="btn btn-light btn-sm" th:href="@{/admin/logout}">Logout</a>
    </div>
</nav>

<!-- Sidebar -->
<div class="sidebar">
    <a th:href="@{/admin/dashboard}">Dashboard</a>
    <a th:href="@{/admin/users}">Users</a>
    <a th:href="@{/admin/vehicles}">Vehicles</a>
<!--    <a th:href="@{/admin/settings}">Settings</a>-->
</div>

<!-- Main Content -->
<div class="main-content">
    <h2>Dashboard Overview</h2>
    <div class="row mt-4">
        <!-- Total Users -->
        <div class="col-md-3 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Total Users</h5>
                    <h3 th:text="${totalUsers}">0</h3>
                </div>
            </div>
        </div>
        <!-- Total Vehicles -->
        <div class="col-md-3 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Total Vehicles</h5>
                    <h3 th:text="${totalVehicles}">0</h3>
                </div>
            </div>
        </div>
        <!-- Active Vehicles -->
        <div class="col-md-3 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Active Vehicles</h5>
                    <h3 th:text="${activeVehicles}">0</h3>
                </div>
            </div>
        </div>
        <!-- Deactive Vehicles -->
        <div class="col-md-3 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Deactive Vehicles</h5>
                    <h3 th:text="${deactiveVehicles}">0</h3>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
